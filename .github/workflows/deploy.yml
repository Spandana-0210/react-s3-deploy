name: Build and Upload to S3
 
on:
  push:
    branches:
      - main
 
permissions:
  id-token: write
  contents: read
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
 
      - name: Install dependencies
        run: npm install
 
      - name: Build React app
        run: npm run build
 
      - name: Zip build folder
        run: zip -r build.zip build
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::212499160857:role/spa-react-s3-deploy
          aws-region: us-east-1
 
      - name: Upload to S3
        run: aws s3 cp build.zip s3://spa-react-s3-deploy/
